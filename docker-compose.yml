services:
  watcher:
    build: ./watcher
    restart: unless-stopped
    volumes:
      - /media/HDD-Storage/Business/Emily/Influencer-Automation-App/Queue:/queue
      - /media/HDD-Storage/Business/Emily/Influencer-Automation-App/Archive:/archive
      - /media/HDD-Storage/Business/Emily/Influencer-Automation-App/credentials:/credentials
      - /media/HDD-Storage/Business/Emily/Influencer-Automation-App/Shared:/shared
      - ./fonts:/fonts:ro
      - ./watcher/watcher.py:/app/watcher.py
      - ./watcher/thumbnail.py:/app/thumbnail.py
      - ./watcher/youtube.py:/app/youtube.py
    environment:
      - TZ=America/Denver
    env_file:
      - ./watcher/.env

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /media/HDD-Storage/Business/Emily/Influencer-Automation-App/Queue:/queue
      - /media/HDD-Storage/Business/Emily/Influencer-Automation-App/Archive:/archive
      - /media/HDD-Storage/Business/Emily/Influencer-Automation-App/credentials:/credentials
      - /media/HDD-Storage/Business/Emily/Influencer-Automation-App/Shared:/shared
      - ./watcher/.env:/app/watcher.env
      - ./dashboard/main.py:/app/main.py
      - ./dashboard/static:/app/static
    environment:
      - TZ=America/Denver
